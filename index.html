<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Qurban QR Pro - Sistem Administrasi</title>

<!-- External -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>

<style>
body {
  background: radial-gradient(circle at top right, #1e1b4b, #000000);
  min-height: 100vh;
  color: white;
  font-family: 'Inter', sans-serif;
  margin: 0;
  padding: 1rem;
}
.glass-card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:1.5rem;
}
.neon-text { text-shadow:0 0 10px rgba(168,85,247,0.8);}
.tab-content{display:none;}
.tab-content.active{display:block;}
#reader{max-width:350px;margin:auto;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginOverlay" class="fixed inset-0 bg-black/90 flex items-center justify-center z-50">
<div class="glass-card p-6 w-full max-w-md text-center">
<h2 class="text-xl font-bold mb-3">Nama Petugas</h2>
<input id="inputPetugas" class="w-full p-3 rounded bg-black/40 mb-3" placeholder="Nama...">
<button onclick="savePetugas()" class="bg-purple-600 px-4 py-2 rounded">Masuk</button>
</div>
</div>

<div class="max-w-4xl mx-auto">

<h1 class="text-3xl font-bold mb-6">QURBAN QR PRO</h1>

<!-- NAV -->
<div class="flex gap-2 mb-6">
<button onclick="showTab('dashboard')" class="btn">Dashboard</button>
<button onclick="showTab('scanner')" class="btn">Scan</button>
<button onclick="showTab('generator')" class="btn">PDF</button>
</div>

<!-- DASHBOARD -->
<div id="tab-dashboard" class="tab-content active">
<h3>Dashboard</h3>
<p>Total: <span id="statTotal">0</span></p>
<p>Sudah: <span id="statSudah">0</span></p>
<p>Sisa: <span id="statSisa">0</span></p>
</div>

<!-- SCAN -->
<div id="tab-scanner" class="tab-content">
<div id="reader"></div>
<input id="manualId" placeholder="Input manual" class="mt-4 p-2 text-black"/>
<button onclick="processManualScan()">Kirim</button>
<div id="scanResult" class="mt-4"></div>
</div>

<!-- PDF -->
<div id="tab-generator" class="tab-content">
<button onclick="generatePDF()">Generate PDF</button>
</div>

</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbw9iqJw_SPYIejjSsjW78XktE_3s8qbnRWh6650HfE7h23DLvWQolp0NVGTZ6HDztEXIw/exec";

let html5QrCode;

// AUTH
function savePetugas(){
 const val=document.getElementById('inputPetugas').value;
 localStorage.setItem('petugas',val);
 document.getElementById('loginOverlay').style.display='none';
}

// TAB
function showTab(id){
 document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));
 document.getElementById('tab-'+id).classList.add('active');

 if(id==='scanner') startScanner();
}

// SCANNER
function startScanner(){
 html5QrCode = new Html5Qrcode("reader");
 html5QrCode.start(
  { facingMode:"environment" },
  { fps:10, qrbox:250 },
  (text)=>handleScan(text)
 );
}

// HANDLE SCAN
async function handleScan(id){
 document.getElementById('scanResult').innerText="Scan: "+id;

 const res = await fetch(API_URL,{
  method:'POST',
  body:JSON.stringify({
    action:'scanQR',
    qrId:id,
    petugas:localStorage.getItem('petugas')
  })
 });

 const data=await res.json();
 document.getElementById('scanResult').innerText=JSON.stringify(data);
}

// MANUAL
function processManualScan(){
 const val=document.getElementById('manualId').value;
 handleScan(val);
}

// PDF
function generatePDF(){
 const { jsPDF } = window.jspdf;
 const doc = new jsPDF();
 doc.text("Qurban QR",10,10);
 doc.save("qurban.pdf");
}
</script>

</body>
</html>
